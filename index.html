<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>看图写词语游戏</title>

<style>
body{
    font-family:"Microsoft YaHei",sans-serif;
    background:#f0f8ff;
    text-align:center;
    padding:20px;
}

h1{
    color:#333;
}

.game-box{
    background:white;
    max-width:700px;
    margin:auto;
    padding:30px;
    border-radius:20px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

img{
    width:300px;
    height:300px;
    object-fit:cover;
    border-radius:15px;
    margin-bottom:20px;
}

input{
    width:250px;
    padding:12px;
    font-size:22px;
    text-align:center;
    border:2px solid #ccc;
    border-radius:10px;
}

button{
    margin-top:15px;
    padding:10px 25px;
    font-size:18px;
    border:none;
    border-radius:10px;
    background:#4CAF50;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#43a047;
}

.result{
    margin-top:20px;
    font-size:24px;
    font-weight:bold;
}

.score{
    margin-top:15px;
    font-size:20px;
    color:#333;
}
</style>
</head>

<body>

<h1>看图写词语</h1>

<div class="game-box">

    <img id="image" src="" alt="image">

    <div>
        <input type="text" id="answer" placeholder="请输入中文">
    </div>

    <button onclick="checkAnswer()">检查答案</button>

    <div class="result" id="result"></div>

    <div class="score" id="score">
        得分：0 / 0
    </div>

</div>

<script>

const words = [

{

{

    image:"https://img-rs.lifetimes.cn/dp/api/files/imageDir/e3c5f77580997224d08e67f92bf35537u5.jpg"
},


{
    word:"出租车",
    image:"https://helloartsy.com/wp-content/uploads/cars/draw-a-taxi/draw-a-taxi.jpg"

},

{

},

},

{
    word:"狗",

},

},

{
    word:"病人",
    image:"https://img.pikbest.com/png-images/qiantu/sick-patient-cartoon-image-illustration_2718936.png!sw800"
},

{
    word:"医生",
    image:"https://pic.pngsucai.com/00/90/48/8eda447848959ff9.webp"
},

{
    word:"书",
    image:"https://www.shutterstock.com/image-vector/colorful-cartoon-illustration-neat-stack-600nw-2722106511.jpg"

},

{
    word:"玩",
    image:"https://pic.616pic.com/ys_bnew_img/00/50/65/0WIgyIii1B.jpg"
},

{
    word:"售货员",
    image:"https://pic.616pic.com/ys_bnew_img/00/11/98/OBh1zjP3Dk.jpg"
},

{
    word:"水果",
    image:"https://img.freepik.com/premium-vector/kawaii-cute-fruit-cartoon-collection-adorable-handdrawn-fruit-illustrations_6997-4680.jpg"
},

{
    word:"苹果",
    image:"https://img.redocn.com/sheji/20231226/katongsigepingguosucai_13201638.jpg"
},

{
    word:"商店",
    image:"https://pic.pngsucai.com/00/91/36/c8bbbfdd94347910.webp"
},

{
    word:"衣服",
    image:"https://pic.616pic.com/ys_bnew_img/00/37/70/oDWy4wjw0b.jpg"
}

];

let current = 0;
let correct = 0;

function shuffle(array){
    return array.sort(() => Math.random() - 0.5);
}

shuffle(words);

const image = document.getElementById("image");
const answer = document.getElementById("answer");
const result = document.getElementById("result");
const score = document.getElementById("score");

function loadQuestion(){

    image.src = words[current].image;

    answer.value = "";

    result.innerText = "";

}

function checkAnswer(){

    const userAnswer = answer.value.trim();

    if(userAnswer === words[current].word){

        result.innerText = "✅ 正确！";
        result.style.color = "green";

        correct++;

    }else{

        result.innerText = "❌ 错误！正确答案：" + words[current].word;
        result.style.color = "red";

    }

    current++;

    score.innerText = `得分：${correct} / ${current}`;

    if(current < words.length){

        setTimeout(loadQuestion,1000);

    }else{

        setTimeout(()=>{

            image.style.display = "none";
            answer.style.display = "none";

            result.innerText = `游戏结束！你答对了 ${correct} / ${words.length}`;

        },1000);

    }

}

loadQuestion();

</script>

</body>
</html>
